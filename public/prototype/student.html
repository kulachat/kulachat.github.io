<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ดูใบงานที่ได้รับมอบหมาย ติดตามสถานะ และออกแบบเส้นทางชีวิตของคุณบนแพลตฟอร์ม a-achieve" />
    <meta name="robots" content="noindex, nofollow" />
    <title>ใบงานของฉัน — a-achieve</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400..600,0..1,0" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', '"Noto Sans Thai"', 'sans-serif'],
              title: ['"FC Subject Rounded"', '"Noto Sans Thai"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              fc: ['"FC Subject Rounded"', '"Noto Sans Thai"', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            },
            colors: {
              achieve: {
                blue: '#0A8DCD',
                deep: '#0677AD',
                ink: '#14213d',
                line: '#e5edf5',
                soft: '#f1f8fd',
              },
            },
            boxShadow: {
              card: '0 4px 20px rgba(0, 0, 0, 0.06)',
              soft: '0 3px 10px rgba(0, 0, 0, 0.04)',
              drawer: '-14px 0 40px rgba(28, 45, 71, 0.12)',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-white font-sans text-[14px] text-achieve-ink antialiased">
    <div class="min-h-screen">

      <div id="app-header"></div>

      <main class="mx-auto max-w-7xl px-5 py-8 lg:px-8">

        <!-- Hero + Stats row (5 boxes) -->
        <div class="mb-8 grid grid-cols-2 gap-3 lg:grid-cols-5">

          <!-- Welcome hero card -->
          <div class="col-span-2 relative overflow-hidden rounded-2xl bg-gradient-to-br from-sky-400 via-blue-400 to-indigo-500 p-4 text-white shadow-lg lg:col-span-1">
            <div class="pointer-events-none absolute -right-6 -top-8 h-28 w-28 rounded-full bg-white/10"></div>
            <div class="pointer-events-none absolute -bottom-4 right-12 h-16 w-16 rounded-full bg-white/10"></div>
            <div class="relative z-10 flex h-full flex-col justify-between">
              <h1 class="font-title text-lg font-bold leading-snug">สวัสดี อาชีฟเวอร์ 👋</h1>
              <p class="mt-2 text-xs text-white/80">ม.5/1 · ภาคเรียนที่ 1/2568</p>
            </div>
          </div>

          <!-- Stat: Total -->
          <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
            <div class="mb-1.5 inline-flex h-8 w-8 items-center justify-center rounded-xl bg-slate-100">
              <span class="material-symbols-rounded text-[16px] text-slate-500">assignment</span>
            </div>
            <p class="text-xs text-slate-500">ใบงานทั้งหมด</p>
            <p class="mt-0.5 font-title text-xl font-bold text-slate-800" id="statTotal">—</p>
          </div>

          <!-- Stat: Unread -->
          <div class="rounded-2xl border border-sky-100 bg-white p-3.5 shadow-sm">
            <div class="mb-1.5 inline-flex h-8 w-8 items-center justify-center rounded-xl bg-sky-100">
              <span class="material-symbols-rounded text-[16px] text-sky-500">mark_unread_chat_alt</span>
            </div>
            <p class="text-xs text-slate-500">ยังไม่เปิด</p>
            <p class="mt-0.5 font-title text-xl font-bold text-slate-800" id="statUnread">—</p>
          </div>

          <!-- Stat: Read -->
          <div class="rounded-2xl border border-emerald-100 bg-white p-3.5 shadow-sm">
            <div class="mb-1.5 inline-flex h-8 w-8 items-center justify-center rounded-xl bg-emerald-100">
              <span class="material-symbols-rounded text-[16px] text-emerald-500">check_circle</span>
            </div>
            <p class="text-xs text-slate-500">เปิดแล้ว</p>
            <p class="mt-0.5 font-title text-xl font-bold text-slate-800" id="statRead">—</p>
          </div>

          <!-- Stat: Expired -->
          <div class="rounded-2xl border border-slate-100 bg-white p-3.5 shadow-sm">
            <div class="mb-1.5 inline-flex h-8 w-8 items-center justify-center rounded-xl bg-slate-100">
              <span class="material-symbols-rounded text-[16px] text-slate-300">hourglass_disabled</span>
            </div>
            <p class="text-xs text-slate-400">หมดเวลา</p>
            <p class="mt-0.5 font-title text-xl font-bold text-slate-300" id="statExpired">—</p>
          </div>

        </div>

        <!-- Pending -->
        <section class="mb-8" id="pendingSection">
          <h2 class="mb-3 flex items-center gap-2 font-title text-base font-semibold text-slate-900">
            รอดำเนินการ
            <span class="inline-flex min-h-5 items-center rounded-full bg-gradient-to-r from-sky-400 to-blue-500 px-2.5 text-xs font-semibold text-white" id="pendingBadge"></span>
          </h2>
          <div class="grid gap-3" id="pendingList"></div>
        </section>

        <!-- Done -->
        <section id="doneSection">
          <h2 class="mb-3 flex items-center gap-2 font-title text-base font-semibold text-slate-400">
            เปิดแล้ว
          </h2>
          <div class="grid gap-3" id="doneList"></div>
        </section>

      </main>

    </div>

    <!-- Overlay -->
    <div class="fixed inset-0 z-30 hidden bg-slate-900/25 backdrop-blur-sm" id="drawerOverlay"></div>

    <!-- Assignment detail drawer -->
    <aside class="fixed bottom-0 right-0 top-0 z-40 flex w-full max-w-md translate-x-full flex-col bg-white shadow-drawer transition-transform duration-300 ease-in-out" id="assignmentDrawer" aria-hidden="true">
      <header class="flex shrink-0 items-center justify-between gap-4 border-b border-sky-100 bg-white px-5 py-4">
        <div class="flex min-w-0 items-center gap-3">
          <div class="h-14 w-10 shrink-0 rounded-xl" id="drawerCover"></div>
          <div class="min-w-0">
            <p class="text-xs text-slate-400" id="drawerOrder"></p>
            <h2 class="line-clamp-2 font-title text-base font-semibold leading-snug text-slate-900" id="drawerTitle"></h2>
          </div>
        </div>
        <button class="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors" type="button" id="closeDrawerBtn" aria-label="ปิด">
          <span class="material-symbols-rounded text-[22px]">close</span>
        </button>
      </header>

      <div class="min-h-0 flex-1 overflow-y-auto px-5 py-5">

        <!-- Deadline -->
        <div id="drawerDeadline"></div>

        <!-- Dynamic content rendered by JS based on assignment type -->
        <div id="drawerContent"></div>

      </div>

      <footer class="shrink-0 border-t border-sky-100 bg-white px-5 py-4">
        <div class="flex items-center gap-2 rounded-xl px-4 py-3 text-sm" id="drawerStatus">
          <span class="material-symbols-rounded text-[18px]" id="drawerStatusIcon">schedule</span>
          <span id="drawerStatusText">ยังไม่เปิดดู</span>
        </div>
      </footer>
    </aside>

    <script>
      fetch('components/header-student.html')
        .then(r => r.text())
        .then(html => {
          document.getElementById('app-header').innerHTML = html;
          const s = document.createElement('script');
          s.src = 'js/student.js';
          document.body.appendChild(s);
        });
    </script>
  </body>
</html>
