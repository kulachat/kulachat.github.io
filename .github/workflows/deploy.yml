name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build site
        run: npm run build

      - name: Create capital-P redirects (case-sensitive on Linux)
        run: |
          mkdir -p dist/Prototype
          for page in student admin admin-theme collab index career-content career-category career-detail; do
            mkdir -p "dist/Prototype/${page}"
            cat > "dist/Prototype/${page}/index.html" <<EOF
          <!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=/prototype/${page}/"><link rel="canonical" href="/prototype/${page}/"></head><body><script>location.replace('/prototype/${page}/')</script></body></html>
          EOF
          done

      - name: Create legacy .html redirects for old URLs
        run: |
          mkdir -p dist/prototype
          for page in student admin admin-theme collab index career-content career-category career-detail; do
            cat > "dist/prototype/${page}.html" <<EOF
          <!doctype html><html><head><meta charset="utf-8"><meta http-equiv="refresh" content="0;url=/prototype/${page}/"><link rel="canonical" href="/prototype/${page}/"></head><body><script>location.replace('/prototype/${page}/')</script></body></html>
          EOF
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
